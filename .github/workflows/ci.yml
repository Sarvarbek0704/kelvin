# =============================================================================
#  KELVIN — CI
#  Spetsifikatsiya: docs/12-infrastructure.md §10, docs/14-testing-strategy.md
#
#  ⚠️  Avtomatik trigger vaqtincha o'chirilgan — bu GitHub hisobida Actions
#      hozircha mavjud emas (billing). Pipeline to'liq yozilgan va ishlashga
#      tayyor; Actions yoqilgandan keyin quyidagi push/pull_request blokini
#      komentdan chiqarish kifoya.
#
#      Lokal ekvivalenti (CI bilan bir xil tekshiruvlar):
#        pnpm lint && pnpm typecheck && pnpm test:unit && pnpm build
# =============================================================================

name: CI

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  # --- Tez tekshiruvlar -----------------------------------------------------
  static:
    name: Lint · Format · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kelvin/api db:generate

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Prisma validate
        run: pnpm --filter @kelvin/api exec prisma validate

  # --- Arxitektura chegaralari ----------------------------------------------
  #  core/ sof TypeScript bo'lib qolishi CI bilan majburlanadi.
  #  Bu job yiqilsa — modul chegarasi buzilgan. docs/adr/0001-modular-monolith.md
  architecture:
    name: Arxitektura chegaralari (ADR-0001)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kelvin/api db:generate
      - run: pnpm --filter @kelvin/api arch:check

  # --- Unit testlar ---------------------------------------------------------
  test-unit:
    name: Unit testlar
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kelvin/api db:generate
      - run: pnpm test:unit

  # --- Integration: REAL PostgreSQL/Redis/Meilisearch -----------------------
  #  Mock DB ishlatilmaydi — u yolg'on ishonch beradi.
  #
  #  ⚠️  Bu yerda ENG MUHIM test bor: oversell concurrency testi.
  #      100 parallel so'rov, 1 tovar → aniq 1 muvaffaqiyat.
  #      docs/06-inventory-and-reservations.md §9
  test-integration:
    name: Integration testlar (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kelvin/api db:generate
      - run: pnpm test:integration
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

  # --- Build ----------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @kelvin/api db:generate
      - run: pnpm build

  # --- Xavfsizlik -----------------------------------------------------------
  security:
    name: Xavfsizlik skani
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high

      # Sirlar commit qilinmaganini tekshirish.
      # docs/11-security.md §9
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-passed:
    name: CI o'tdi
    runs-on: ubuntu-latest
    needs: [static, architecture, test-unit, test-integration, build, security]
    if: always()
    steps:
      - name: Natijani tekshirish
        run: |
          if echo '${{ toJSON(needs) }}' | grep -q '"result": *"failure"'; then
            echo "::error::CI yiqildi"
            exit 1
          fi
          echo "Hammasi o'tdi"

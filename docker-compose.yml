# =============================================================================
#  KELVIN — lokal ishlab chiqish muhiti
#  Ishga tushirish:  docker compose up -d
#  Spetsifikatsiya:  docs/12-infrastructure.md §4
# =============================================================================

name: kelvin

services:
  postgres:
    image: postgres:17-alpine
    container_name: kelvin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kelvin
      POSTGRES_PASSWORD: kelvin_dev_only
      POSTGRES_DB: kelvin
      # Determinizm: barcha muhitda bir xil collation.
      # Aks holda ORDER BY natijasi platformaga qarab farq qiladi.
      POSTGRES_INITDB_ARGS: '--locale=C.UTF-8 --encoding=UTF8'
      TZ: UTC
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kelvin -d kelvin']
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - log_min_duration_statement=200
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_connections=100

  redis:
    image: redis:7-alpine
    container_name: kelvin-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  # Faceted search — 15+ atribut bo'yicha filtr + facet count.
  # Nega PostgreSQL emas: docs/05-catalog-and-search.md §3
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: kelvin-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '7700:7700'
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # S3-mos storage — mahsulot rasmlari.
  # 1000 mahsulot × 5 rasm × 4 o'lcham = 20 000 fayl.
  minio:
    image: minio/minio:latest
    container_name: kelvin-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: kelvin
      MINIO_ROOT_PASSWORD: kelvin_dev_only
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Dev'da email tutib qolish — haqiqiy email yuborilmaydi
  mailpit:
    image: axllent/mailpit:latest
    container_name: kelvin-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
